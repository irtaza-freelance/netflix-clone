<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="sign.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <nav class="navbar navbar-expand-lg">
          <div class="container-fluid">
            <a class="navbar-brand netlixTitle" href="#">Netflix</a>
          </div>
        </nav>
      </div>
    </div>
    <hr />
    <div class="section">
      <div class="container">
        <div class="head">
          <h2>Enter Your Info To Sign In</h2>
        </div>
        <div class="para">
          <p>Or get started with a new account.</p>
        </div>

        <div class="input">
          <input type="text" placeholder="Enter Email" autocomplete="false" id="inp"/>
    
        </div>
        <div class="divelement">
            <p class="msg"></p>
        </div>
        <div class="button">
          <input type="button" value="Continue" class=".but" onclick="check()" />
        </div>

        <div class="custom-dropdown">
            <button class="btn" onclick="this.parentElement.classList.toggle('open')">
              Get Help <span class="icon">▼</span>
            </button>
          
            <div class="menu">
              <p>Help Center</p>
              <p>Contact Support</p>
            </div>
          </div>
        <div class="pra">
            <p>
              This page is protected by Google reCAPTCHA to ensure you're not a bot.
            </p>
          </div>
      </div>
      
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="sign.js"></script>
</html>
